# ================================
# ERPAuto 配置模板
# ================================
# 部署说明：
# 1. 复制此文件为 config.yaml
# 2. 根据实际环境修改配置值
# 3. 设置 database.activeType 为 mysql 或 sqlserver
# ================================
# 注意：ERP 认证信息存储在数据库 (dbo_BIPUsers) 中，按用户管理
# ================================

database:
  activeType: mysql

  mysql:
    host: <MYSQL_HOST>
    port: 3306
    database: <DATABASE_NAME>
    username: <USERNAME>
    password: <PASSWORD>
    charset: utf8mb4

  sqlserver:
    server: <SQL_SERVER_HOST>
    port: 1433
    database: <DATABASE_NAME>
    username: <USERNAME>
    password: <PASSWORD>
    driver: 'ODBC Driver 18 for SQL Server'
    trustServerCertificate: true

paths:
  dataDir: './data/'
  defaultOutput: 'output.xlsx'
  validationOutput: 'validation-result.xlsx'

extraction:
  batchSize: 100
  verbose: true
  autoConvert: true
  mergeBatches: true
  enableDbPersistence: true

validation:
  dataSource: database_full
  batchSize: 2000
  matchMode: substring
  enableCrud: false
  defaultManager: ''

orderResolution:
  tableName: ''
  productionIdField: ''
  orderNumberField: ''

cleaner:
  queryBatchSize: 100
  processConcurrency: 1

logging:
  level: info
  auditRetention: 30
  appRetention: 14

# 自动更新配置
updater:
  enabled: true
  checkOnStartup: true
  autoDownload: true
  defaultChannelForAdmin: 'stable'

  S3:
    endpoint: 'http://192.168.110.114:9000'
    accessKey: '<YOUR_ACCESS_KEY>'
    secretKey: '<YOUR_SECRET_KEY>'
    bucket: 'erpauto'
    region: 'us-east-1'

  channels:
    stable:
      enabled: true
      path: 'updates/stable'

    beta:
      enabled: true
      path: 'updates/beta'
      adminOnly: true

# RustFS 对象存储配置（用于持久化报告）
rustfs:
  enabled: false # 设置为 true 启用 RustFS 上传
  endpoint: 'http://192.168.110.114:9000' # RustFS 服务器地址
  accessKey: '<YOUR_ACCESS_KEY>' # 访问密钥
  secretKey: '<YOUR_SECRET_KEY>' # 密钥
  bucket: 'erpauto' # 存储桶名称
  region: 'us-east-1' # 区域（S3 兼容，默认即可）
