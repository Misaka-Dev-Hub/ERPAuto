# ================================
# ERPAuto 配置模板
# ================================
# 部署说明：
# 1. 复制此文件为 config.yaml
# 2. 根据实际环境修改配置值
# 3. 设置 database.activeType 为 mysql 或 sqlserver
# ================================
# 注意：ERP 认证信息存储在数据库 (dbo_BIPUsers) 中，按用户管理
# ================================

database:
  activeType: mysql

  mysql:
    host: <MYSQL_HOST>
    port: 3306
    database: <DATABASE_NAME>
    username: <USERNAME>
    password: <PASSWORD>
    charset: utf8mb4

  sqlserver:
    server: <SQL_SERVER_HOST>
    port: 1433
    database: <DATABASE_NAME>
    username: <USERNAME>
    password: <PASSWORD>
    driver: 'ODBC Driver 18 for SQL Server'
    trustServerCertificate: true

paths:
  dataDir: './data/'
  defaultOutput: 'output.xlsx'
  validationOutput: 'validation-result.xlsx'

extraction:
  batchSize: 100
  verbose: true
  autoConvert: true
  mergeBatches: true
  enableDbPersistence: true

validation:
  dataSource: database_full
  batchSize: 2000
  matchMode: substring
  enableCrud: false
  defaultManager: ''

orderResolution:
  tableName: ''
  productionIdField: ''
  orderNumberField: ''
